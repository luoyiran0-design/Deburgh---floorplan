<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Burgh Floorplans</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2933;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    p {
      margin: 0 0 20px;
      color: #52606d;
      line-height: 1.6;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .tab-btn {
      border: none;
      background: #dbeafe;
      color: #1e3a8a;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .tab-btn.active {
      background: #2563eb;
      color: white;
    }

    .viewer {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }

    .floor-image {
      display: none;
      width: 100%;
      height: auto;
    }

    .floor-image.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>De Burgh Floorplans</h1>
    <p>Click a floor button below to switch between floor plan images.</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="showFloor('img0005', this)">0005</button>
      <button class="tab-btn" onclick="showFloor('img0006', this)">0006</button>
      <button class="tab-btn" onclick="showFloor('img0007', this)">0007</button>
      <button class="tab-btn" onclick="showFloor('img0008', this)">0008</button>
      <button class="tab-btn" onclick="showFloor('img0009', this)">0009</button>
      <button class="tab-btn" onclick="showFloor('img0010', this)">0010</button>
      <button class="tab-btn" onclick="showFloor('img0011', this)">0011</button>
      <button class="tab-btn" onclick="showFloor('img0012', this)">0012</button>
    </div>

    <div class="viewer">
      <img id="img0005" class="floor-image active" src="./0005.png" alt="Floor 0005" />
      <img id="img0006" class="floor-image" src="./0006.png" alt="Floor 0006" />
      <img id="img0007" class="floor-image" src="./0007.png" alt="Floor 0007" />
      <img id="img0008" class="floor-image" src="./0008.png" alt="Floor 0008" />
      <img id="img0009" class="floor-image" src="./0009.png" alt="Floor 0009" />
      <img id="img0010" class="floor-image" src="./0010.png" alt="Floor 0010" />
      <img id="img0011" class="floor-image" src="./0011.png" alt="Floor 0011" />
      <img id="img0012" class="floor-image" src="./0012.png" alt="Floor 0012" />
    </div>
  </div>

  <script>
    function showFloor(id, btn) {
      document.querySelectorAll('.floor-image').forEach(img => {
        img.classList.remove('active');
      });

      document.querySelectorAll('.tab-btn').forEach(button => {
        button.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
